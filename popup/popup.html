<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpoilerShield</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #16161a;
      --border:    #2a2a30;
      --accent:    #ff4b4b;
      --accent-lo: rgba(255,75,75,0.12);
      --text:      #e8e8ee;
      --muted:     #6c6c7e;
      --success:   #3ecf8e;
      --radius:    10px;
      --font:      'Courier New', monospace;
    }

    body {
      width: 320px;
      min-height: 400px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shield-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 18px rgba(255,75,75,0.4);
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Toggle Row ───────────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .toggle-label {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .toggle {
      position: relative; width: 40px; height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* ── Keywords Section ─────────────────────────────────────────── */
    .section {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font);
      font-size: 18px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: grid; place-items: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.95); }

    /* ── Keyword Tags ─────────────────────────────────────────────── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 60px;
      max-height: 160px;
      overflow-y: auto;
      padding: 4px 0;
    }

    .tags::-webkit-scrollbar { width: 4px; }
    .tags::-webkit-scrollbar-track { background: transparent; }
    .tags::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-lo);
      border: 1px solid rgba(255,75,75,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text);
      letter-spacing: 0.03em;
      animation: tagIn 0.2s ease;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .tag-del {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 14px;
      cursor: pointer;
      width: auto; height: auto;
      padding: 0;
      line-height: 1;
      opacity: 0.7;
    }
    .tag-del:hover { opacity: 1; }

    .empty-state {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 16px 0;
      letter-spacing: 0.03em;
    }

    /* ── Status Bar ───────────────────────────────────────────────── */
    .status {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-align: center;
    }

    .status.saved { color: var(--success); }
  </style>
</head>
<body>

  <div class="header">
    <div class="shield-icon">🛡</div>
    <div class="header-text">
      <h1>SpoilerShield</h1>
      <p>YouTube · Twitter/X · Reddit</p>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Shield Active</span>
    <label class="toggle">
      <input type="checkbox" id="enabledToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <span class="section-label">Spoiler Keywords</span>

    <div class="input-row">
      <input type="text" id="keywordInput" placeholder="e.g. episode 10, finale…" maxlength="60" />
      <button id="addBtn" title="Add keyword">+</button>
    </div>

    <div class="tags" id="tagList">
      <span class="empty-state" id="emptyMsg">No keywords yet. Add one above.</span>
    </div>
  </div>

  <div class="status" id="statusBar">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
